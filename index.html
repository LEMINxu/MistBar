<style>
@import url('https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&family=DM+Serif+Text&family=Dancing+Script:wght@400..700&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Pixelify+Sans:wght@400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
</style>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=landscape">
    <title>MistBar Pixel RPG</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 竖屏提示 */
        #portrait-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 99999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
            font-size: 1.5rem;
            font-family: 'Pixelify Sans', sans-serif;
            text-align: center;
        }
        
        /* iPad/手机竖屏时显示提示 */
        @media (max-aspect-ratio: 1/1) {
            #portrait-warning {
                display: flex;
            }
            #game-container {
                display: none;
            }
        }
    </style>
</head>

<body>
    <!-- 竖屏提示 -->
    <div id="portrait-warning">
        <div style="margin-bottom: 30px; font-size: 3rem;">📱</div>
        <div>Please rotate your device</div>
        <div style="font-size: 1rem; margin-top: 20px; opacity: 0.7;">to landscape mode</div>
    </div>
    
    <div id="game-container">
        <div id="scene-area">
            <div id="quiz-image-display" class="hidden"></div>
            <div id="card-stage" class="hidden">
                <div class="tarot-card" id="tarot-card">
                    <div class="card-face card-front" id="card-front-display">
                        <div class="card-inner-border">
                        </div>
                    </div>
                    <div class="card-face card-back">
                        <div id="drink-image-display" class="drink-art-box"></div>
                        <h3 id="recipe-title">灵魂配方</h3>
                        <div id="recipe-content"></div>
                        <p class="tap-hint">[ Click to Flip ]</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="search-overlay" class="hidden">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Type the keywords (i.e.Gin, Lemon)...">
                <div class="search-btns">
                    <button onclick="executeSearch()">[ Find ]</button>
                    <button onclick="closeSearch()">[ Back ]</button>
                </div>
                <div id="search-results"></div>
            </div>
        </div>

        <div id="dialogue-area">
    <div class="dialogue-wrapper">
        <div id="portrait-container">
            <div id="portrait-img"></div>
        </div>

        <div id="dialogue-box">
            <div id="dialogue-text">Welcome to the MistBar...</div>
            <div id="options-overlay">
                </div>
        </div>
    </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
